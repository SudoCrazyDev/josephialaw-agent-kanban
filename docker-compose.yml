services:
  kanban:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: agent-kanban:local
    container_name: dwap-kanban
    restart: unless-stopped
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      MCP_TOKEN_PEPPER: ${MCP_TOKEN_PEPPER}
      CRON_SECRET: ${CRON_SECRET}
      NODE_ENV: production
    # Bind to loopback only — the host's nginx is the public entrypoint.
    # Host port 8001 (8000 is in use on this EC2 box); container listens on 3000.
    ports:
      - "8001:3000"
