name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:     us-east-1
  ECR_REGISTRY:   406751652854.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: dwap/kanban
  DEPLOY_PATH:    /opt/agent-kanban

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push image to ECR
        uses: docker/build-push-action@v5
        with:
          context:   .
          file:      ./docker/Dockerfile
          platforms: linux/amd64
          push:      true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Materialize .env.production
        env:
          ENV_CONTENTS: ${{ secrets.ENV_CONTENTS }}
        run: |
          printf '%s' "$ENV_CONTENTS" > .env.production
          echo ".env.production written ($(wc -l < .env.production) lines)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Get short-lived ECR password for EC2 docker login
        id: ecr-password
        run: |
          PASSWORD=$(aws ecr get-login-password --region "$AWS_REGION")
          echo "::add-mask::$PASSWORD"
          {
            echo "password<<EOF"
            echo "$PASSWORD"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   ".env.production,docker-compose.yml,docker-compose.prod.yml"
          target:   ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Pull + restart on EC2
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY:   ${{ env.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG:      ${{ needs.build-and-push.outputs.image_tag }}
          ECR_PASSWORD:   ${{ steps.ecr-password.outputs.password }}
          DEPLOY_PATH:    ${{ env.DEPLOY_PATH }}
        with:
          host:       ${{ secrets.EC2_HOST }}
          username:   ${{ secrets.EC2_USER }}
          key:        ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,ECR_PASSWORD,DEPLOY_PATH
          script: |
            set -euo pipefail

            cd "$DEPLOY_PATH"

            # ECR tokens last 12h — fresh login every deploy
            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            docker compose \
              --env-file .env.production \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull

            docker compose \
              --env-file .env.production \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --no-build --remove-orphans

            # Drop dangling layers so disk doesn't fill up
            docker image prune -f
