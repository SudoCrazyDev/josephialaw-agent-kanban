# Production overlay — apply alongside docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
#
# Swaps the locally-built image for the one pushed to ECR by the deploy
# workflow (.github/workflows/deploy.yml). `build` is inherited from the base
# compose file but isn't executed in prod because we always pass --no-build.

services:
  web:
    image: 406751652854.dkr.ecr.us-east-1.amazonaws.com/dwap/kanban:latest
    restart: always
    pull_policy: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
