# Production overlay — apply alongside docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
#
# Must share the service name (`kanban`) with the base compose file so the
# merge replaces the image instead of creating a parallel service.
# The deploy workflow always passes --no-build, so the `build:` block
# inherited from the base file is never executed in prod.

services:
  kanban:
    image: 406751652854.dkr.ecr.us-east-1.amazonaws.com/dwap/kanban:latest
    restart: always
    pull_policy: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
